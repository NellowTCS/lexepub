name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build and package only (skip GitHub release upload)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release lexepub
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lexepub

      - name: Run tests
        run: cd lexepub && cargo test --release

      - name: Run clippy
        run: cd lexepub && cargo clippy --release --all-features -- -D warnings

      - name: Check formatting
        run: cd lexepub && cargo fmt --check

      - name: Build release
        run: cd lexepub && cargo build --release

      - name: Build WASM adapter
        run: cd lexepub && wasm-pack build --release --target web

      - name: Generate C bindings
        run: |
          cd lexepub
          cargo build --release --features c-ffi
          if command -v diplomat-tool >/dev/null 2>&1; then
            diplomat-tool c .
          fi

      - name: Create release archive
        run: |
          set -e
          ROOT_DIR="${GITHUB_WORKSPACE}"
          CRATE_DIR="${ROOT_DIR}/lexepub"
          ARCHIVE_NAME="lexepub-${{ github.ref_name }}.tar.gz"

          rm -rf /tmp/lexepub-release
          mkdir -p /tmp/lexepub-release/lib /tmp/lexepub-release/include

          # Include platform-specific native artifacts only when present.
          for artifact in \
            "${CRATE_DIR}/target/release/liblexepub.so" \
            "${CRATE_DIR}/target/release/liblexepub.dylib" \
            "${CRATE_DIR}/target/release/liblexepub.a" \
            "${CRATE_DIR}/target/release/lexepub.dll"
          do
            if [ -f "$artifact" ]; then
              cp "$artifact" /tmp/lexepub-release/lib/
            fi
          done

          cp -R "${CRATE_DIR}/include/." /tmp/lexepub-release/include/
          cp -R "${CRATE_DIR}/pkg" /tmp/lexepub-release/pkg
          cp "${CRATE_DIR}/README.md" /tmp/lexepub-release/README.md
          cp "${CRATE_DIR}/LICENSE" /tmp/lexepub-release/LICENSE

          tar -czf "${ROOT_DIR}/${ARCHIVE_NAME}" -C /tmp/lexepub-release .

      - name: Create GitHub release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v1
        with:
          files: lexepub-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
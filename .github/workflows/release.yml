name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release lexepub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lexepub

      - name: Run tests
        run: cd lexepub && cargo test --release

      - name: Run clippy
        run: cd lexepub && cargo clippy --release --all-features -- -D warnings

      - name: Check formatting
        run: cd lexepub && cargo fmt --check

      - name: Build release
        run: cd lexepub && cargo build --release

      - name: Build WASM adapter
        run: cd lexepub && wasm-pack build --release --target web

      - name: Generate C bindings
        run: |
          cd lexepub
          cargo build --release --features c-ffi
          if command -v diplomat-tool >/dev/null 2>&1; then
            diplomat-tool c .
          fi

      - name: Create release archive
        run: |
          set -e
          rm -rf /tmp/lexepub-release
          mkdir -p /tmp/lexepub-release/lib /tmp/lexepub-release/include

          # Include platform-specific native artifacts only when present.
          for artifact in \
            /workspaces/lexepub/lexepub/target/release/liblexepub.so \
            /workspaces/lexepub/lexepub/target/release/liblexepub.dylib \
            /workspaces/lexepub/lexepub/target/release/liblexepub.a \
            /workspaces/lexepub/lexepub/target/release/lexepub.dll
          do
            if [ -f "$artifact" ]; then
              cp "$artifact" /tmp/lexepub-release/lib/
            fi
          done

          cp -R /workspaces/lexepub/lexepub/include/. /tmp/lexepub-release/include/
          cp -R /workspaces/lexepub/lexepub/pkg /tmp/lexepub-release/pkg
          cp /workspaces/lexepub/lexepub/README.md /tmp/lexepub-release/README.md
          cp /workspaces/lexepub/lexepub/LICENSE /tmp/lexepub-release/LICENSE

          tar -czf /workspaces/lexepub/lexepub-${{ github.ref_name }}.tar.gz -C /tmp/lexepub-release .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          files: lexepub-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
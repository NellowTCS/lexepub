name: Deploy GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Build everything
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      # Build core library
      - name: Install Build deps and build library
        run: |
          cd Demo
          npm ci
          npm run build
          cd ../Docs
          npm ci
          npm run build
          cd ../

      # Prepare full page deploy directory
      - name: Prepare Pages assets
        run: |
          mkdir -p gh-pages-root
          # Demo at root
          mkdir -p gh-pages-root/demo
          cp -r Demo/dist/* gh-pages-root/
          # Docs at docs/
          mkdir -p gh-pages-root/docs
          cp -r Docs/site/* gh-pages-root/docs/

      - name: Deploy all assets to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages-root
          keep_files: false # Or true, depending
          commit_message: Deploy Demo
